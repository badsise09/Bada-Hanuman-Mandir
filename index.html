<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Bada Hanuman Mandir</title>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700&family=Cinzel:wght@400;600;700&family=EB+Garamond:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --saffron: #FF6B00;
      --gold: #D4A017;
      --deep-red: #8B1A1A;
      --cream: #FFF8EE;
      --dark: #1A0A00;
      --light-gold: #F5C842;
      --maroon: #6B0000;
    }

    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    html { scroll-behavior: smooth; }

    body {
      background-color: var(--dark);
      color: var(--cream);
      font-family: 'EB Garamond', serif;
      overflow-x: hidden;
    }

    /* \u2500\u2500 Noise Texture Overlay \u2500\u2500 */
    body::before {
      content: '';
      position: fixed; inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");
      pointer-events: none; z-index: 9999; opacity: 0.4;
    }

    /* \u2500\u2500 NAV \u2500\u2500 */
    nav {
      position: fixed; top: 0; width: 100%; z-index: 100;
      display: flex; align-items: center; justify-content: space-between;
      padding: 1.2rem 4rem;
      background: linear-gradient(to bottom, rgba(26,10,0,0.95), transparent);
      backdrop-filter: blur(2px);
    }

    .nav-logo {
      font-family: 'Cinzel Decorative', serif;
      font-size: 1.1rem;
      color: var(--light-gold);
      letter-spacing: 0.05em;
      text-shadow: 0 0 20px rgba(212,160,23,0.5);
    }

    .nav-links { display: flex; gap: 2.5rem; list-style: none; }
    .nav-links a {
      font-family: 'Cinzel', serif;
      font-size: 0.8rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--cream);
      text-decoration: none;
      transition: color 0.3s;
      opacity: 0.85;
    }
    .nav-links a:hover { color: var(--light-gold); opacity: 1; }

    /* \u2500\u2500 HERO \u2500\u2500 */
    .hero {
      position: relative;
      height: 100vh;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      text-align: center;
      overflow: hidden;
    }

    .hero-bg {
      position: absolute; inset: 0;
      background:
        radial-gradient(ellipse 80% 60% at 50% 100%, rgba(255,107,0,0.25) 0%, transparent 70%),
        radial-gradient(ellipse 60% 40% at 50% 50%, rgba(212,160,23,0.08) 0%, transparent 60%),
        radial-gradient(ellipse 100% 80% at 50% 0%, rgba(139,26,26,0.3) 0%, transparent 60%),
        linear-gradient(180deg, #0D0500 0%, #1A0800 40%, #2A0D00 100%);
    }

    /* Mandala circles */
    .mandala {
      position: absolute;
      border-radius: 50%;
      border: 1px solid rgba(212,160,23,0.12);
      animation: rotate-slow 40s linear infinite;
    }
    .mandala-1 { width: 700px; height: 700px; top: 50%; left: 50%; transform: translate(-50%,-50%); }
    .mandala-2 { width: 520px; height: 520px; top: 50%; left: 50%; transform: translate(-50%,-50%); border-color: rgba(255,107,0,0.1); animation-duration: 30s; animation-direction: reverse; }
    .mandala-3 { width: 360px; height: 360px; top: 50%; left: 50%; transform: translate(-50%,-50%); border-color: rgba(212,160,23,0.15); }

    .mandala::before, .mandala::after {
      content: '';
      position: absolute; inset: 20px;
      border-radius: 50%;
      border: 1px dashed rgba(212,160,23,0.1);
    }
    .mandala::after { inset: 40px; border-style: dotted; }

    @keyframes rotate-slow { to { transform: translate(-50%,-50%) rotate(360deg); } }

    .diya {
      font-size: 2.5rem;
      animation: flicker 2s ease-in-out infinite alternate;
      margin-bottom: 1.5rem;
      filter: drop-shadow(0 0 20px rgba(255,150,0,0.8));
    }
    @keyframes flicker {
      0% { transform: scale(1) rotate(-2deg); filter: drop-shadow(0 0 15px rgba(255,150,0,0.6)); }
      100% { transform: scale(1.05) rotate(2deg); filter: drop-shadow(0 0 30px rgba(255,180,0,1)); }
    }

    .hero-subtitle {
      font-family: 'Cinzel', serif;
      font-size: 0.85rem;
      letter-spacing: 0.4em;
      text-transform: uppercase;
      color: var(--saffron);
      margin-bottom: 1.2rem;
      opacity: 0;
      animation: fade-up 1s ease 0.3s forwards;
    }

    .hero-title {
      font-family: 'Cinzel Decorative', serif;
      font-size: clamp(2.8rem, 7vw, 6rem);
      line-height: 1.1;
      color: var(--light-gold);
      text-shadow:
        0 0 40px rgba(212,160,23,0.6),
        0 0 80px rgba(255,107,0,0.3),
        0 2px 0 rgba(139,26,26,0.5);
      opacity: 0;
      animation: fade-up 1s ease 0.5s forwards;
      margin-bottom: 0.5rem;
    }

    .hero-title span {
      display: block;
      font-size: 0.6em;
      color: var(--cream);
      text-shadow: none;
      opacity: 0.7;
      letter-spacing: 0.15em;
    }

    .hero-tagline {
      font-family: 'EB Garamond', serif;
      font-size: 1.25rem;
      font-style: italic;
      color: rgba(255,248,238,0.7);
      margin-top: 1.5rem;
      opacity: 0;
      animation: fade-up 1s ease 0.8s forwards;
    }

    .hero-divider {
      width: 200px; height: 1px;
      background: linear-gradient(to right, transparent, var(--gold), transparent);
      margin: 2rem auto;
      opacity: 0;
      animation: fade-up 1s ease 1s forwards;
    }

    .hero-cta {
      display: flex; gap: 1.5rem;
      opacity: 0;
      animation: fade-up 1s ease 1.2s forwards;
    }

    .btn {
      font-family: 'Cinzel', serif;
      font-size: 0.78rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      padding: 0.9rem 2.4rem;
      border: none; cursor: pointer;
      text-decoration: none; display: inline-block;
      transition: all 0.3s;
    }

    .btn-primary {
      background: linear-gradient(135deg, var(--saffron), var(--gold));
      color: var(--dark);
      font-weight: 700;
      clip-path: polygon(8px 0%, 100% 0%, calc(100% - 8px) 100%, 0% 100%);
    }
    .btn-primary:hover {
      box-shadow: 0 0 30px rgba(255,107,0,0.6);
      transform: translateY(-2px);
    }

    .btn-outline {
      background: transparent;
      color: var(--cream);
      border: 1px solid rgba(212,160,23,0.4);
      clip-path: polygon(8px 0%, 100% 0%, calc(100% - 8px) 100%, 0% 100%);
    }
    .btn-outline:hover {
      border-color: var(--gold);
      color: var(--light-gold);
      background: rgba(212,160,23,0.05);
    }

    .scroll-indicator {
      position: absolute; bottom: 2.5rem; left: 50%; transform: translateX(-50%);
      display: flex; flex-direction: column; align-items: center; gap: 0.5rem;
      opacity: 0; animation: fade-up 1s ease 1.8s forwards;
    }
    .scroll-indicator span {
      font-family: 'Cinzel', serif;
      font-size: 0.65rem;
      letter-spacing: 0.3em;
      color: rgba(255,248,238,0.4);
      text-transform: uppercase;
    }
    .scroll-line {
      width: 1px; height: 50px;
      background: linear-gradient(to bottom, var(--gold), transparent);
      animation: scroll-pulse 2s ease-in-out infinite;
    }
    @keyframes scroll-pulse {
      0%, 100% { opacity: 0.3; transform: scaleY(1); }
      50% { opacity: 1; transform: scaleY(1.2); }
    }

    @keyframes fade-up {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* \u2500\u2500 SECTION COMMON \u2500\u2500 */
    section { padding: 7rem 4rem; }

    .section-label {
      font-family: 'Cinzel', serif;
      font-size: 0.72rem;
      letter-spacing: 0.5em;
      text-transform: uppercase;
      color: var(--saffron);
      margin-bottom: 1rem;
    }

    .section-title {
      font-family: 'Cinzel Decorative', serif;
      font-size: clamp(1.8rem, 3.5vw, 3rem);
      color: var(--light-gold);
      line-height: 1.2;
      margin-bottom: 1.5rem;
    }

    .gold-line {
      width: 80px; height: 2px;
      background: linear-gradient(to right, var(--saffron), var(--gold));
      margin: 1.5rem 0;
    }

    /* \u2500\u2500 ABOUT \u2500\u2500 */
    #about {
      background: linear-gradient(135deg, #100400 0%, #1E0800 50%, #110300 100%);
      position: relative; overflow: hidden;
    }

    #about::before {
      content: '\u0964\u0964 \u091c\u092f \u092c\u091c\u0930\u0902\u0917 \u092c\u0932\u0940 \u0964\u0964';
      position: absolute;
      font-family: 'Cinzel Decorative', serif;
      font-size: 8rem;
      color: rgba(255,107,0,0.03);
      top: 50%; left: 50%;
      transform: translate(-50%,-50%);
      white-space: nowrap;
      pointer-events: none;
    }

    .about-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 6rem;
      max-width: 1200px;
      margin: 0 auto;
      align-items: center;
    }

    .about-text p {
      font-size: 1.15rem;
      line-height: 1.9;
      color: rgba(255,248,238,0.8);
      margin-bottom: 1.2rem;
    }

    .about-visual {
      position: relative;
      display: flex; align-items: center; justify-content: center;
    }

    .om-symbol {
      font-size: 12rem;
      color: var(--gold);
      text-shadow:
        0 0 60px rgba(212,160,23,0.4),
        0 0 120px rgba(255,107,0,0.2);
      animation: om-pulse 4s ease-in-out infinite;
      font-family: serif;
    }

    @keyframes om-pulse {
      0%, 100% { transform: scale(1); filter: drop-shadow(0 0 20px rgba(212,160,23,0.4)); }
      50% { transform: scale(1.05); filter: drop-shadow(0 0 40px rgba(212,160,23,0.8)); }
    }

    .about-visual::before {
      content: '';
      position: absolute;
      width: 280px; height: 280px;
      border-radius: 50%;
      border: 1px solid rgba(212,160,23,0.15);
      animation: rotate-slow 20s linear infinite;
    }

    .about-visual::after {
      content: '';
      position: absolute;
      width: 220px; height: 220px;
      border-radius: 50%;
      border: 1px dashed rgba(255,107,0,0.1);
      animation: rotate-slow 15s linear infinite reverse;
    }

    /* \u2500\u2500 TIMINGS \u2500\u2500 */
    #timings {
      background: #0D0400;
      text-align: center;
    }

    .timings-header { max-width: 600px; margin: 0 auto 4rem; }
    .timings-header .gold-line { margin: 1.5rem auto; }

    .timings-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 2px;
      max-width: 1000px;
      margin: 0 auto;
      background: rgba(212,160,23,0.1);
    }

    .timing-card {
      background: linear-gradient(160deg, #180600, #120400);
      padding: 2.5rem 2rem;
      position: relative;
      transition: all 0.3s;
    }

    .timing-card:hover {
      background: linear-gradient(160deg, #2A0A00, #1E0700);
      transform: translateY(-4px);
      z-index: 1;
      box-shadow: 0 10px 40px rgba(255,107,0,0.15);
    }

    .timing-icon { font-size: 2.2rem; margin-bottom: 1rem; }

    .timing-name {
      font-family: 'Cinzel', serif;
      font-size: 0.8rem;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: var(--saffron);
      margin-bottom: 0.8rem;
    }

    .timing-time {
      font-family: 'Cinzel Decorative', serif;
      font-size: 1.6rem;
      color: var(--light-gold);
      text-shadow: 0 0 20px rgba(212,160,23,0.3);
    }

    .timing-desc {
      font-size: 0.9rem;
      color: rgba(255,248,238,0.5);
      margin-top: 0.6rem;
      font-style: italic;
    }

    /* \u2500\u2500 FESTIVALS \u2500\u2500 */
    #festivals {
      background: linear-gradient(180deg, #0D0400 0%, #160600 100%);
    }

    .festivals-layout {
      max-width: 1200px;
      margin: 0 auto;
      display: grid;
      grid-template-columns: 1fr 2fr;
      gap: 5rem;
      align-items: start;
    }

    .festival-list { display: flex; flex-direction: column; gap: 2px; }

    .festival-item {
      padding: 1.5rem 2rem;
      background: rgba(255,107,0,0.03);
      border-left: 2px solid transparent;
      cursor: pointer;
      transition: all 0.3s;
      border-bottom: 1px solid rgba(212,160,23,0.08);
    }

    .festival-item:hover, .festival-item.active {
      background: rgba(255,107,0,0.08);
      border-left-color: var(--saffron);
    }

    .festival-item h4 {
      font-family: 'Cinzel', serif;
      font-size: 0.9rem;
      letter-spacing: 0.1em;
      color: var(--cream);
      margin-bottom: 0.3rem;
    }

    .festival-item span {
      font-size: 0.82rem;
      color: var(--gold);
      font-style: italic;
    }

    .festival-detail {
      background: linear-gradient(135deg, rgba(255,107,0,0.05), rgba(212,160,23,0.02));
      border: 1px solid rgba(212,160,23,0.1);
      padding: 3rem;
      position: relative;
    }

    .festival-detail::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 2px;
      background: linear-gradient(to right, var(--saffron), var(--gold), transparent);
    }

    .festival-detail h3 {
      font-family: 'Cinzel Decorative', serif;
      font-size: 1.8rem;
      color: var(--light-gold);
      margin-bottom: 1.5rem;
    }

    .festival-detail p {
      font-size: 1.1rem;
      line-height: 1.9;
      color: rgba(255,248,238,0.75);
    }

    .festival-detail .badge {
      display: inline-block;
      font-family: 'Cinzel', serif;
      font-size: 0.7rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      padding: 0.4rem 1rem;
      background: rgba(255,107,0,0.15);
      border: 1px solid rgba(255,107,0,0.3);
      color: var(--saffron);
      margin-bottom: 1.5rem;
    }

    /* \u2500\u2500 GALLERY \u2500\u2500 */
    #gallery {
      background: #0D0400;
      text-align: center;
    }

    .gallery-header { max-width: 600px; margin: 0 auto 3rem; }
    .gallery-header .gold-line { margin: 1.5rem auto; }

    .gallery-grid {
      display: grid;
      grid-template-columns: 2fr 1fr 1fr;
      grid-template-rows: 250px 250px;
      gap: 6px;
      max-width: 1200px;
      margin: 0 auto;
    }

    .gallery-item {
      position: relative;
      overflow: hidden;
      background: rgba(255,107,0,0.05);
      border: 1px solid rgba(212,160,23,0.1);
      cursor: pointer;
    }

    .gallery-item:first-child { grid-row: 1 / 3; }

    .gallery-inner {
      width: 100%; height: 100%;
      display: flex; align-items: center; justify-content: center;
      flex-direction: column;
      gap: 1rem;
      transition: all 0.4s;
      background: linear-gradient(135deg, #180600, #0D0400);
    }

    .gallery-item:hover .gallery-inner {
      background: linear-gradient(135deg, #2A0A00, #180600);
    }

    .gallery-icon { font-size: 3rem; opacity: 0.6; }
    .gallery-caption {
      font-family: 'Cinzel', serif;
      font-size: 0.72rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: rgba(212,160,23,0.5);
    }

    .gallery-item::after {
      content: '';
      position: absolute; inset: 0;
      background: linear-gradient(to top, rgba(255,107,0,0.08), transparent);
      opacity: 0;
      transition: opacity 0.3s;
    }

    .gallery-item:hover::after { opacity: 1; }

    /* \u2500\u2500 CONTACT \u2500\u2500 */
    #contact {
      background: linear-gradient(180deg, #0D0400 0%, #060200 100%);
    }

    .contact-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 5rem;
      max-width: 1200px;
      margin: 0 auto;
    }

    .contact-info h2 { margin-bottom: 0; }
    .contact-info .gold-line { margin: 1.5rem 0; }

    .contact-details { display: flex; flex-direction: column; gap: 1.8rem; margin-top: 2.5rem; }

    .contact-row {
      display: flex; align-items: flex-start; gap: 1.2rem;
    }

    .contact-icon {
      font-size: 1.4rem;
      flex-shrink: 0;
      margin-top: 0.1rem;
      filter: drop-shadow(0 0 6px rgba(255,107,0,0.5));
    }

    .contact-row-text h5 {
      font-family: 'Cinzel', serif;
      font-size: 0.72rem;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: var(--saffron);
      margin-bottom: 0.4rem;
    }

    .contact-row-text p {
      font-size: 1.05rem;
      color: rgba(255,248,238,0.75);
      line-height: 1.6;
    }

    .contact-form { display: flex; flex-direction: column; gap: 1.2rem; }

    .form-group { display: flex; flex-direction: column; gap: 0.5rem; }

    .form-group label {
      font-family: 'Cinzel', serif;
      font-size: 0.7rem;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: rgba(255,248,238,0.5);
    }

    .form-group input, .form-group textarea {
      background: rgba(255,107,0,0.04);
      border: 1px solid rgba(212,160,23,0.15);
      color: var(--cream);
      padding: 0.9rem 1.2rem;
      font-family: 'EB Garamond', serif;
      font-size: 1rem;
      outline: none;
      transition: border-color 0.3s, background 0.3s;
      resize: none;
    }

    .form-group input:focus, .form-group textarea:focus {
      border-color: rgba(255,107,0,0.4);
      background: rgba(255,107,0,0.07);
    }

    .form-group input::placeholder, .form-group textarea::placeholder {
      color: rgba(255,248,238,0.2);
    }

    /* \u2500\u2500 FOOTER \u2500\u2500 */
    footer {
      background: #030100;
      text-align: center;
      padding: 3rem 2rem;
      border-top: 1px solid rgba(212,160,23,0.1);
    }

    .footer-logo {
      font-family: 'Cinzel Decorative', serif;
      font-size: 1.4rem;
      color: var(--light-gold);
      margin-bottom: 0.8rem;
      text-shadow: 0 0 20px rgba(212,160,23,0.3);
    }

    .footer-mantra {
      font-size: 1.1rem;
      font-style: italic;
      color: rgba(255,248,238,0.4);
      margin-bottom: 2rem;
    }

    .footer-links {
      display: flex; gap: 2rem; justify-content: center;
      list-style: none; margin-bottom: 2.5rem;
    }

    .footer-links a {
      font-family: 'Cinzel', serif;
      font-size: 0.72rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: rgba(255,248,238,0.35);
      text-decoration: none;
      transition: color 0.3s;
    }

    .footer-links a:hover { color: var(--gold); }

    .footer-copy {
      font-size: 0.85rem;
      color: rgba(255,248,238,0.2);
    }

    .om-footer {
      font-size: 2rem;
      margin-bottom: 1rem;
      animation: om-pulse 3s ease-in-out infinite;
      display: inline-block;
    }

    /* \u2500\u2500 DECORATIVE PATTERN \u2500\u2500 */
    .pattern-divider {
      text-align: center;
      padding: 1.5rem;
      color: rgba(212,160,23,0.2);
      font-size: 1.2rem;
      letter-spacing: 1rem;
    }

    /* \u2500\u2500 RESPONSIVE \u2500\u2500 */
    @media (max-width: 900px) {
      nav { padding: 1rem 1.5rem; }
      .nav-links { display: none; }
      section { padding: 5rem 1.5rem; }
      .about-grid, .festivals-layout, .contact-grid { grid-template-columns: 1fr; gap: 3rem; }
      .timings-grid { grid-template-columns: 1fr; }
      .gallery-grid { grid-template-columns: 1fr 1fr; grid-template-rows: repeat(3, 200px); }
      .gallery-item:first-child { grid-row: auto; }
      .hero-cta { flex-direction: column; align-items: center; }
    }
  </style>
</head>
<body>

  <!-- NAV -->
  <nav>
    <div class="nav-logo">\ud83d\udd49 Bada Hanuman Mandir</div>
    <ul
